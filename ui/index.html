<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Food-101 · ViT + LoRA</title>
<style>
  :root {
    --bg: #0b0e13; --panel: #12161f; --border: #232a38;
    --text: #e8eaed; --muted: #8b93a1; --accent: #ffb86e; --bar: #ffb86e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  .wrap { max-width: 860px; margin: 0 auto; padding: 36px 20px 60px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  h1 span { color: var(--accent); }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

  #drop {
    border: 2px dashed var(--border); border-radius: 14px; padding: 44px 20px;
    text-align: center; color: var(--muted); cursor: pointer; font-size: 15px;
    transition: border-color .15s, background .15s;
  }
  #drop.hover { border-color: var(--accent); color: var(--accent); background: rgba(255,184,110,.05); }

  .toggle { margin-top: 12px; font-size: 13px; color: var(--muted); display: flex; gap: 8px; align-items: center; }

  #result { display: none; margin-top: 26px; gap: 22px; }
  #result.show { display: flex; flex-wrap: wrap; }
  #preview {
    width: 300px; max-width: 100%; border-radius: 12px; border: 1px solid var(--border);
    object-fit: cover; align-self: flex-start;
  }
  #preds { flex: 1; min-width: 280px; }
  .pred { margin-bottom: 14px; }
  .pred .name {
    display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px;
    text-transform: capitalize;
  }
  .pred .name b { font-variant-numeric: tabular-nums; color: var(--accent); }
  .bar-bg { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; height: 14px; overflow: hidden; }
  .bar {
    height: 100%; background: var(--bar); border-radius: 5px; width: 0;
    transition: width .5s cubic-bezier(.2,.8,.2,1);
  }
  .pred:first-child .name { font-size: 16px; }
  #meta { margin-top: 8px; color: var(--muted); font-size: 12.5px; }
  #status { margin-top: 16px; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Food-101 <span>ViT-B/16 + LoRA</span></h1>
  <div class="sub" id="stats">Fine-grained food classification — 101 classes, fine-tuned with low-rank adapters (~1% of parameters trained).</div>

  <div id="drop">🍜 drop a food photo here, or click to pick one</div>
  <input type="file" id="file" accept="image/*" style="display:none" />
  <label class="toggle"><input type="checkbox" id="tta" /> test-time augmentation (average with horizontal flip — slower, slightly more accurate)</label>

  <div id="status"></div>

  <div id="result">
    <img id="preview" alt="" />
    <div id="preds"></div>
  </div>
</div>

<script>
const drop = document.getElementById("drop");
const file = document.getElementById("file");
const status = document.getElementById("status");
const result = document.getElementById("result");
const preview = document.getElementById("preview");
const predsEl = document.getElementById("preds");
const ttaBox = document.getElementById("tta");

fetch("/api/stats").then(r => r.json()).then(s => {
  let txt = `${s.model} · ${s.classes} classes`;
  if (s.benchmark && s.benchmark.test_top1_tta)
    txt += ` · ${(s.benchmark.test_top1_tta * 100).toFixed(2)}% top-1 on the official Food-101 test set`;
  document.getElementById("stats").textContent = txt;
}).catch(() => {});

async function classify(f) {
  preview.src = URL.createObjectURL(f);
  result.classList.add("show");
  predsEl.innerHTML = "";
  status.textContent = "classifying…";

  const fd = new FormData();
  fd.append("file", f);
  const res = await fetch(`/api/classify?tta=${ttaBox.checked}`, { method: "POST", body: fd });
  if (!res.ok) { status.textContent = "error: " + (await res.text()); return; }
  const data = await res.json();

  status.textContent = `inference: ${data.latency_ms} ms (CPU)${data.tta ? " · TTA on" : ""}`;
  predsEl.innerHTML = "";
  for (const p of data.predictions) {
    const div = document.createElement("div");
    div.className = "pred";
    div.innerHTML = `
      <div class="name"><span>${p.label}</span><b>${(p.prob * 100).toFixed(1)}%</b></div>
      <div class="bar-bg"><div class="bar"></div></div>`;
    predsEl.appendChild(div);
    requestAnimationFrame(() =>
      requestAnimationFrame(() => { div.querySelector(".bar").style.width = (p.prob * 100) + "%"; }));
  }
}

drop.addEventListener("click", () => file.click());
file.addEventListener("change", () => { if (file.files[0]) classify(file.files[0]); });
["dragover", "dragenter"].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("hover"); }));
["dragleave", "drop"].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("hover"); }));
drop.addEventListener("drop", e => {
  const f = e.dataTransfer.files[0];
  if (f) classify(f);
});
document.addEventListener("paste", e => {
  const f = [...e.clipboardData.files][0];
  if (f) classify(f);
});
</script>
</body>
</html>
